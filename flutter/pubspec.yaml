name: glyph
description: "Custom font stickers for Instagram Stories"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  file_picker: ^9.2.1
  image_gallery_saver_plus: ^4.0.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  permission_handler: ^11.4.0
  google_fonts: ^6.2.1
  flex_color_picker: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
